<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Loading</title>

    <style>
        body {
            margin: 0;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            flex-direction: column;
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            color: #007aff;
            margin-bottom: 24px;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #d9d9d9;
            border-top: 4px solid #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="logo">
        Lynn
    </div>

    <div class="spinner"></div>

    <script>
        setTimeout(() => {
            window.location.href = "scheduler.html";
        }, 1500);
    </script>

</body>

</html>
