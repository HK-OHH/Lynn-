<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Lynn Scheduler</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lynn">
    <meta name="theme-color" content="#007aff">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #0b3d91, #0057d9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: bold;
            backdrop-filter: blur(12px);
            margin-bottom: 24px;
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 28px;
            opacity: 0.9;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        #frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #offline {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #0b3d91, #0057d9);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            font-size: 17px;
            z-index: 20;
        }

        #offline.show {
            display: flex;
        }
    </style>
</head>

<body>

    <div id="splash">
        <div class="logo">Lynn.</div>
        <div class="label">연결 중...</div>
        <div class="spinner"></div>
    </div>

    <div id="offline">
        <div class="logo">Lynn,</div>
        <div>인터넷 연결을 확인해주세요.</div>
    </div>

    <iframe id="frame" src="https://woomi-smart-scheduler.jogh.workers.dev/site/b4c75edb-1ab6-47f6-a927-6ca27674653d"
        allow="fullscreen">
    </iframe>

    <script>
        const splash = document.getElementById('splash');
        const frame = document.getElementById('frame');
        const offline = document.getElementById('offline');

        if (!navigator.onLine) {
            splash.classList.add('hidden');
            offline.classList.add('show');
        } else {
            frame.addEventListener('load', () => {
                splash.classList.add('hidden');
            });
        }

        window.addEventListener('offline', () => {
            offline.classList.add('show');
        });

        window.addEventListener('online', () => {
            offline.classList.remove('show');
            frame.src = frame.src;
        });
    </script>

</body>

</html>
